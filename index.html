<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header card">
    <h1 id="time">10:45:22</h1>
    <p id="date">Tuesday, January 27, 2026</p>
    <h2 id="greeting">Good Morning</h2>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TIMER -->
    <div class="card timer-card">
      <h3>Focus Timer</h3>
      <div id="timer">25:00</div>
      <div class="btn-group">
        <button class="primary" onclick="startTimer()">Start</button>
        <button onclick="stopTimer()">Stop</button>
        <button onclick="resetTimer()">Reset</button>
      </div>
    </div>

    <!-- TASK -->
    <div class="card task-card">
      <h3>Tasks</h3>
      <div class="task-input">
        <input id="taskInput" placeholder="Add a new task..." />
        <button class="primary" onclick="addTask()">Add</button>
      </div>
      <ul id="taskList"></ul>
    </div>

  </div>

  <!-- LINKS -->
  <div class="card links-card">
    <h3>Quick Links</h3>
    <div class="link-input">
      <input id="linkName" placeholder="Link name">
      <input id="linkURL" placeholder="URL">
      <button class="primary" onclick="addLink()">Add Link</button>
    </div>
    <div id="links"></div>
  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
